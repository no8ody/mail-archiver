name: Docker

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

jobs:
  docker:
    name: Docker build and push
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (
        github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'develop'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout exact CI commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image settings
        id: image
        shell: bash
        run: |
          FULL_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="$(echo "$FULL_SHA" | cut -c1-12)"
          REF_NAME="${{ github.event.workflow_run.head_branch }}"
          SAFE_REF=$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_.-]/-/g')

          {
            echo "full_sha=${FULL_SHA}"
            echo "short_sha=${SHORT_SHA}"
            echo "tags<<EOF"
            if [[ "${REF_NAME}" == "main" ]]; then
              echo "no8odycares/mailarchiver:latest"
              echo "no8odycares/mailarchiver:sha-${SHORT_SHA}"
            elif [[ "${REF_NAME}" == "develop" ]]; then
              echo "no8odycares/mailarchiver:dev"
              echo "no8odycares/mailarchiver:sha-${SHORT_SHA}"
            else
              echo "no8odycares/mailarchiver:${SAFE_REF}-${SHORT_SHA}"
              echo "no8odycares/mailarchiver:sha-${SHORT_SHA}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GIT_COMMIT=${{ steps.image.outputs.full_sha }}
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.revision=${{ steps.image.outputs.full_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max