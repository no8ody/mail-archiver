name: CI

on:
  push:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dotnet:
    name: Restore, build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ./MailArchiver.csproj

      - name: Build
        run: dotnet build ./MailArchiver.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish ./MailArchiver.csproj -c Release -o ./artifacts/publish --no-build

      - name: Upload publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mail-archiver-publish
          path: ./artifacts/publish
          if-no-files-found: error