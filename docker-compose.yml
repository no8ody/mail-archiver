version: '3.8'

networks:
  postgres:

services:
  mailarchive-app:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    environment:
      MAILARCHIVER_GIT_COMMIT: ${GIT_COMMIT:-unknown}
      ASPNETCORE_URLS: http://0.0.0.0:5000
    restart: always
    ports:
      - "127.0.0.1:5000:5000"
    networks:
      - postgres
    volumes:
      - ./appsettings.json:/app/appsettings.json:ro
      - ./logs:/app/logs
      - ./data-protection-keys:/app/DataProtection-Keys
    tmpfs:
      - /tmp
      - /app/uploads
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    depends_on:
      - postgres

  postgres:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: MailArchiver
      POSTGRES_USER: mailuser
      POSTGRES_PASSWORD: masterkey
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailuser -d MailArchiver"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
