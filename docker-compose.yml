version: '3.8'

networks:
  postgres:

services:
  mailarchive-app:
    image: no8odycares/mailarchiver
    environment:
      MAILARCHIVER_GIT_COMMIT: ${GIT_COMMIT:-unknown}
      ASPNETCORE_URLS: http://0.0.0.0:5000

      # Preferred application aliases (legacy __ keys still work)
      MAILARCHIVE_URL: ${MAILARCHIVE_URL:-}
      DATABASE_URL: Host=postgres;Database=${POSTGRES_DB:-MailArchiver};Username=${POSTGRES_USER:-mailuser};Password=${POSTGRES_PASSWORD:-masterkey};
      AUTHENTICATION_USERNAME: ${DEFAULT_USER:-admin}
      AUTHENTICATION_PASSWORD: ${DEFAULT_PASSWORD:-secure123!}
      ENCRYPTION_KEY: ${MAILARCHIVER_ENCRYPTION_KEY:?-}
      TZ: ${TZ:-Etc/UCT}
      REFRESH_INTERVAL_MINUTES: ${REFRESH_INTERVAL_MINUTES:-5}
      REVERSE_PROXY_KNOWN_NETWORKS_0: ${REVERSE_PROXY_KNOWN_NETWORKS_0:-172.16.0.0/12}
      REVERSE_PROXY_FORWARD_LIMIT: ${REVERSE_PROXY_FORWARD_LIMIT:-1}
    restart: always
    ports:
      - "127.0.0.1:5000:5000"
    networks:
      - postgres
    volumes:
      - ./appsettings.json:/app/appsettings.json:ro
      - ./logs:/app/logs
      - ./data-protection-keys:/app/DataProtection-Keys
    tmpfs:
      - /tmp
      - /app/uploads
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: MailArchiver
      POSTGRES_USER: mailuser
      POSTGRES_PASSWORD: masterkey
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailuser -d MailArchiver"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
